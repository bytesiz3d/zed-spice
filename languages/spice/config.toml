name = "SPICE"
grammar = "spice"
path_suffixes = [
    "sp",
    "spi",
    "cir",
    "ckt",
    "net",
    "mod",
    "mdl",
    "lib",
    "sub",
    "scs",
]
line_comments = ["* ", "// "]
autoclose_before = ";:.,=}])` \n\t"

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]

increase_indent_pattern = "(?i)^\\s*(?:\\.(?:subckt|lib(?!\\s*['\"])|control|if|data|model|statistics|section|library)\\b|(?:inline\\s+)?(?:subckt|control|data|section|library|lib(?!\\s*['\"]))\\b)"
decrease_indent_pattern = "(?i)^\\s*\\.?\\s*(?:ends|endl|endc|endif|enddata|endstatistics|endsection|endlibrary|end)\\b"
