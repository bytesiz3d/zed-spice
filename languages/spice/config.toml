name = "SPICE"
grammar = "spice"
path_suffixes = [
    "sp",
    "spi",
    "cir",
    "ckt",
    "net",
    "mod",
    "mdl",
    "lib",
    "sub",
    "scs",
]
line_comments = ["* ", "// "]
autoclose_before = ";:.,=}])` \n\t"

brackets = [
    { start = "{", end = "}", close = true, newline = true },
    { start = "[", end = "]", close = true, newline = true },
    { start = "(", end = ")", close = true, newline = true },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
    { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]

# Note: Zed's regex engine does not support look-around assertions, so
# unlike the equivalent VS Code pattern this cannot special-case `.lib
# "file" section` (a resource include, not a block) versus `.lib name`
# (a block start). Both forms are treated as increasing the indent level.
increase_indent_pattern = "(?i)^\\s*(?:\\.(?:subckt|lib|control|if|data|model|statistics|section|library)\\b|(?:inline\\s+)?(?:subckt|control|data|section|library|lib)\\b)"
decrease_indent_pattern = "(?i)^\\s*\\.?\\s*(?:ends|endl|endc|endif|enddata|endstatistics|endsection|endlibrary|end)\\b"
